name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check repo files
        run: |
          echo "=== ROOT FILES ==="
          ls -la
          echo "=== CAPACITOR CONFIG ==="
          cat capacitor.config.json
          echo "=== WWW FILES ==="
          ls -la www/ || echo "www/ NOT FOUND"
          echo "=== PACKAGE.JSON ==="
          cat package.json

      - name: Install dependencies
        run: |
          npm install --no-package-lock --no-audit --no-fund --verbose
          echo "=== npm install exit code: $? ==="

      - name: Verify Capacitor CLI
        run: |
          ls -la node_modules/.bin/cap
          node_modules/.bin/cap --version
          echo "=== CLI OK ==="

      - name: Copy web assets to Android
        run: |
          node_modules/.bin/cap copy android
          echo "=== CAP COPY OK ==="
          ls -la android/app/src/main/assets/public/ || echo "public dir check"

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: urdu-learn-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
