name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify files before build
        run: |
          echo "=== ROOT ===" && ls -la
          echo "=== WWW ===" && ls -la www/ || echo "www missing"
          echo "=== CONFIG ===" && cat capacitor.config.json
          echo "=== GRADLEW ===" && ls -la android/gradlew
          echo "=== GRADLE WRAPPER ===" && ls -la android/gradle/wrapper/

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify Capacitor CLI installed
        run: |
          ls -la node_modules/.bin/cap
          node_modules/.bin/cap --version

      - name: Sync Capacitor (copy + update plugins)
        run: node_modules/.bin/cap sync android --no-build

      - name: Verify copied assets
        run: ls -la android/app/src/main/assets/public/ || echo "Assets dir check"

      - name: Grant Gradle permission
        run: chmod +x android/gradlew

      - name: Build APK with Gradle
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: urdu-learn-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
