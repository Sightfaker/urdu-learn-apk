name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify files before build
        run: |
          echo "=== ROOT ===" && ls -la
          echo "=== WWW ===" && ls -la www/ || echo "www missing"
          echo "=== CONFIG ===" && cat capacitor.config.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify Capacitor CLI paths
        run: |
          echo "=== Find cap binary ==="
          find node_modules -name "cap" -type f 2>/dev/null | head -5
          find node_modules/.bin -name "cap*" 2>/dev/null | head -5
          echo "=== Direct test ==="
          npx cap --version

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant Gradle permission
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: urdu-learn-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
