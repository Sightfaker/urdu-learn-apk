name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pre-build checks
        run: |
          echo "=== Java Version ==="
          java -version
          echo "=== Capacitor Config ==="
          cat capacitor.config.json
          echo "=== WWW Files ==="
          ls -la www/ || echo "www/ missing"
          echo "=== Gradle Wrapper ==="
          ls -la android/gradlew
          ls -la android/gradle/wrapper/
          echo "=== Android SDK ==="
          echo $ANDROID_HOME
          ls -la $ANDROID_HOME/platforms/ || true
          ls -la $ANDROID_HOME/build-tools/ || true

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Install Capacitor CLI globally
        run: |
          npm install -g @capacitor/cli
          cap --version

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: urdu-learn-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
